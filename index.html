<!DOCTYPE html>
<html lang="fr">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shelfy - Ma bibliothèque</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="hero">
        <div class="container">
            <h1>Shelfy</h1>
            <p>Ta bibliothèque partout avec toi !</p>
            <a href="#download" class="btn">Télécharger maintenant</a>
        </div>
    </header>

    <section id="features" class="features">
        <div class="container">
            <h2>Fonctionnalités</h2>
            <div class="feature-grid">
                <div class="feature">
                    <h3>Recherche de livres</h3>
                    <p>Trouve facilement tes lectures préférées.</p>
                </div>
                <div class="feature">
                    <h3>Suivi de lecture</h3>
                    <p>À lire, en cours, ou terminé, tout est suivi.</p>
                </div>
                <div class="feature">
                    <h3>Favoris</h3>
                    <p>Garde tes coups de cœur à portée de main.</p>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <p>&copy; 2026 Shelfy. <a href="privacy-policy.html">Privacy Policy</a></p>
    </footer>
